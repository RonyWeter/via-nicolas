<div class="container-fluid mt-2">
    <div class="row">
        <div class="col-12 text-end">
            <i class='fas fa-times' style="cursor: pointer;" (click)="dialogRef.close()"></i>
        </div>
    </div>
</div>

<div class="header">
    <div class="text-center w-100">
        <h3 style="font-weight: 500;">Confirm</h3>
    </div>
</div>
<div class="container-fluid mt-4 mb-4">
    <div class="row">
        <div class="col-12 text-center" style="font-size:1rem">
            {{data.message}}
        </div>
    </div>
    <div class="row mt-4">
        <div class="col-12 text-center">
            <button mat-raised-button color="secondary" style="width: 45%;" (click)="dialogRef.close(false)">No
            </button>
            &nbsp;
            <button mat-raised-button class="button-primary" style="width: 45%;" (click)="dialogRef.close(true)">Yes
            </button>
        </div>
    </div>
</div>
