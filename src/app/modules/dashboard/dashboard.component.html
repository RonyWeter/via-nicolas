<div class="container-fluid">
    <div class="row">
        <div class="col-lg-4 mb-2">
            <div class="stat-card d-flex justify-content-between align-items-center fadeInZoumIn"
                style="background-color: #2980B9;color: white;">
                <div>
                    <div class="stat-label">Total Tickets</div>
                    <div class="stat-value">{{getTotal('tickets')}}</div>
                </div>
                <div class="stat-icon icon-blue">
                    <i class="fa-solid fa-plane"></i>
                </div>
            </div>
        </div>
        <div class="col-lg-4 mb-2">
            <div class="stat-card d-flex justify-content-between align-items-center fadeInZoumIn"
                style="background-color: #1ABC9C;color: white;">
                <div>
                    <div class="stat-label">Total Requests</div>
                    <div class="stat-value">{{getTotal('request')}}</div>
                </div>
                <div class="stat-icon icon-blue">
                    <i class="fa-solid fa-file-invoice"></i>
                </div>
            </div>
        </div>
        <div class="col-lg-4 mb-2">
            <div class="stat-card d-flex justify-content-between align-items-center fadeInZoumIn"
                style="background-color: #8E44AD;color: white;">
                <div>
                    <div class="stat-label">Total Profit</div>
                    <div class="stat-value">$ {{getTotal('profit')}}</div>
                </div>
                <div class="stat-icon icon-blue">
                    <i class="fa-solid fa-dollar-sign"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="row mt-2"> <!-- Ensure they are wrapped in a row -->
        <div class="col-lg-4 mb-2 fade-in" style="display: flex;">
            <mat-card class="chart-card"
                style="width: 100%; border-radius: 10px; display: flex; flex-direction: column;">
                <mat-card-header>
                    <mat-card-title>Profit Overview</mat-card-title>
                </mat-card-header>
                <mat-card-content style="flex-grow: 1; display: flex; align-items: center;">
                    <div style="height: 250px; width: 100%;">
                        <canvas baseChart [data]="doughnutChartData" [options]="doughnutChartOptions"
                            [type]="'doughnut'">
                        </canvas>
                    </div>
                </mat-card-content>
            </mat-card>
        </div>

        <div class="col-lg-8 mb-2 fade-in" style="display: flex;">
            <mat-card class="chart-card"
                style="width: 100%; border-radius: 10px; display: flex; flex-direction: column;">
                <mat-card-header>
                    <mat-card-title>Tickets Overview</mat-card-title>
                </mat-card-header>
                <mat-card-content style="flex-grow: 1; display: flex; align-items: center;">
                    <div style="height: 250px; width: 100%;">
                        <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" [type]="'line'">
                        </canvas>
                    </div>
                </mat-card-content>
            </mat-card>
        </div>
    </div>

    <div class="row mt-2">
        <div class="col-lg-12 mb-4 fade-in" style="display: flex;">
            <mat-card class="chart-card"
                style="width: 100%; border-radius: 10px; display: flex; flex-direction: column;">
                <mat-card-header>
                    <mat-card-title>Requests Overview</mat-card-title>
                </mat-card-header>
                <mat-card-content style="flex-grow: 1; display: flex; align-items: center;">
                    <div style="height: 250px; width: 100%;">
                        <canvas baseChart [data]="reqChartData" [options]="reqChartOptions" [type]="'bar'">
                        </canvas>
                    </div>
                </mat-card-content>
            </mat-card>
        </div>
    </div>

</div>
