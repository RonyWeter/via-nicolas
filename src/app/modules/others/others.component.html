<div class="container-fluid">
    <div class="row mt-4">
        <div class="col-lg-8">
            <h2>Requests</h2>
        </div>
        <div class="col-lg-4 text-end">
            <input type="text" placeholder="Search ..." class="search-input" [(ngModel)]="searchText"
                (keyup)="applyFilter()">
        </div>
    </div>
    <div class="row mt-3 mb-4">
        <div class="col-lg-12 text-end">
            <button mat-raised-button class="button-primary" (click)="createNewRequest()">
                <i class="fas fa-plus"></i> New Request
            </button>
        </div>
    </div>

    <div class="row mt-4 mb-2">
        <div class="col-12" *ngFor="let item of filteredRequests; let i = index; let isOdd = odd; let isEven = even">
            <div class="mat-elevation-z4 border-r-10 p-4 mb-3 box" [ngClass]="isOdd ? 'slide-from-right' : 'slide-from-left'">
                <div class="row">
                    <div class="col-xl-2 col-lg-2 col-md-2 col-6 mb-4">
                        <div class="header">ID</div>
                        <div class="text-truncate">{{item.id}}</div>
                    </div>

                    <div class="col-xl-2 col-lg-2 col-md-2 col-6 mb-4">
                        <div class="header">Description</div>
                        <div class="text-truncate">{{item.desc}}</div>
                    </div>

                    <div class="col-xl-2 col-lg-2 col-md-2 col-6 mb-4">
                        <div class="header">Cost</div>
                        <div class="text-truncate">{{item.cost}}</div>
                    </div>

                    <div class="col-xl-2 col-lg-2 col-md-2 col-6 mb-4">
                        <div class="header">Sell</div>
                        <div class="text-truncate">{{item.sell}}</div>
                    </div>

                    <div class="col-xl-2 col-lg-2 col-md-2 col-6 mb-4">
                        <div class="header">Profit</div>
                        <div class="text-truncate">{{item.profit}}</div>
                    </div>

                    <div class="col-xl-2 col-lg-2 col-md-2 col-6 mb-4">
                        <div class="header">Date</div>
                        <div class="text-truncate">{{item.date}}</div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12 text-end">
                        <button mat-raised-button (click)="deleteRequest(item)">
                            Delete
                        </button>
                        &nbsp;
                        <button mat-raised-button class="button-primary" (click)="editRequets(item)">
                            Edit
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4" *ngIf="filteredRequests.length === 0">
            <div class="col-12 text-center" style="font-size: 18px;color: #000000a8;">
                No records found
            </div>
        </div>
    </div>
</div>
